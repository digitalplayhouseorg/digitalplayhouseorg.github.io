name: Fetch Stacker News Feeds

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # also lets you run it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch ~Education posts
        run: |
          curl -s -X POST https://stacker.news/api/graphql \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            -d '{"query":"{ items(sub: \"education\", sort: \"top\", when: \"week\", limit: 6) { items { id title sats ncomments createdAt user { name } } } }"}' \
            -o data/sn-education.json

      - name: Fetch ~jobs posts
        run: |
          curl -s -X POST https://stacker.news/api/graphql \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0" \
            -d '{"query":"{ items(sub: \"jobs\", sort: \"recent\", limit: 6) { items { id title sats ncomments createdAt user { name } } } }"}' \
            -o data/sn-jobs.json

      - name: Validate JSON (skip commit if fetch failed)
        run: |
          python3 -c "
          import json, sys
          for f in ['data/sn-education.json', 'data/sn-jobs.json']:
              try:
                  d = json.load(open(f))
                  items = d.get('data', {}).get('items', {}).get('items', [])
                  print(f'{f}: {len(items)} items OK')
                  if not items:
                      print(f'WARNING: {f} returned 0 items — keeping existing file')
                      sys.exit(1)
              except Exception as e:
                  print(f'ERROR in {f}: {e}')
                  sys.exit(1)
          "

      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sn-education.json data/sn-jobs.json
          git diff --cached --quiet || git commit -m "chore: update SN feeds [skip ci]"
          git push
