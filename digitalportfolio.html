<style>
  :root {
    --teal:#0d7a6a; --teal-light:#14a88f; --teal-dark:#085c50;
    --accent:#f0c93a; --accent2:#e05a3a;
    --off-white:#f5f2ec; --dark:#0d1a17; --mid:#1e3530; --text-muted:#7aa89a;
    --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--dark);color:var(--off-white);font-family:var(--sans);min-height:100vh}
  .page-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(20,168,143,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(20,168,143,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .page-glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(20,168,143,0.08) 0%,transparent 70%);pointer-events:none}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(13,26,23,0.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(20,168,143,0.15)}
  .nav-logo{display:flex;align-items:center;gap:0.7rem;text-decoration:none}
  .nav-logo svg{width:32px;height:32px}
  .nav-wordmark{font-family:var(--mono);font-size:0.75rem;color:var(--off-white);line-height:1.25}
  .nav-wordmark span{color:var(--accent);display:block}
  .nav-back{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.06em;color:var(--text-muted);text-decoration:none;transition:color 0.2s;display:flex;align-items:center;gap:0.4rem}
  .nav-back:hover{color:var(--teal-light)}
  .login-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 1rem 2rem;position:relative;z-index:1}
  .login-card{background:rgba(255,255,255,0.03);border:1px solid rgba(20,168,143,0.2);border-radius:20px;padding:2.5rem;width:100%;max-width:26rem;backdrop-filter:blur(12px)}
  .login-logo{display:flex;align-items:center;justify-content:center;gap:0.75rem;margin-bottom:1.8rem}
  .login-logo-text{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--off-white);line-height:1.2}
  .login-logo-text span{color:var(--accent);display:block;font-size:0.72rem;font-weight:400}
  h1{font-family:var(--mono);font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.4rem;color:var(--off-white)}
  .subtitle{text-align:center;color:var(--text-muted);font-size:0.88rem;margin-bottom:2rem;font-weight:300;line-height:1.6}
  .btn{width:100%;padding:0.75rem 1.5rem;border-radius:8px;font-family:var(--mono);font-weight:700;border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase}
  .btn-primary{background:var(--teal-light);color:var(--dark)}
  .btn-primary:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(20,168,143,0.3)}
  .btn-secondary{background:rgba(255,255,255,0.06);color:var(--off-white);border:1px solid rgba(245,242,236,0.15)}
  .btn-secondary:hover{border-color:var(--teal-light);color:var(--teal-light)}
  .btn-ghost{background:rgba(20,168,143,0.1);color:var(--teal-light);border:1px solid rgba(20,168,143,0.25);font-size:0.72rem;padding:0.5rem 1rem;width:auto}
  .btn-ghost:hover{background:rgba(20,168,143,0.2)}
  .btn-edit{padding:0.4rem 0.6rem;border-radius:6px;background:rgba(20,168,143,0.08);border:1px solid rgba(20,168,143,0.15);color:var(--teal-light);cursor:pointer;transition:all 0.2s;font-size:0.9rem}
  .btn-edit:hover{background:rgba(20,168,143,0.18)}
  .btn-delete{padding:0.4rem 0.6rem;border-radius:6px;background:rgba(224,90,58,0.08);border:1px solid rgba(224,90,58,0.15);color:#e05a3a;cursor:pointer;transition:all 0.2s;font-size:0.9rem}
  .btn-delete:hover{background:rgba(224,90,58,0.18)}
  .btn-cancel{background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid rgba(255,255,255,0.1)}
  input,textarea,select{width:100%;padding:0.6rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(20,168,143,0.2);border-radius:8px;font-size:0.9rem;color:var(--off-white);font-family:var(--sans);transition:all 0.2s}
  input::placeholder,textarea::placeholder{color:var(--text-muted)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal-light);box-shadow:0 0 0 3px rgba(20,168,143,0.12);background:rgba(20,168,143,0.05)}
  select option{background:var(--dark);color:var(--off-white)}
  textarea{resize:vertical;font-family:var(--sans)}
  .main-header{padding:6rem 2rem 1.5rem;position:relative;z-index:1;max-width:1100px;margin:0 auto;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
  .header-title{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--off-white)}
  .header-title span{color:var(--teal-light)}
  .header-pubkey{font-family:var(--mono);font-size:0.7rem;color:var(--text-muted);margin-top:0.3rem}
  .container{max-width:1100px;margin:0 auto;padding:0 2rem 4rem;position:relative;z-index:1}
  .card{background:rgba(255,255,255,0.03);border:1px solid rgba(20,168,143,0.14);border-radius:14px;padding:1.5rem;margin-bottom:1.2rem;transition:border-color 0.2s}
  .card:hover{border-color:rgba(20,168,143,0.28)}
  .card-title{font-family:var(--mono);font-size:0.85rem;font-weight:700;margin-bottom:1rem;color:var(--off-white)}
  .relay-list{display:flex;flex-wrap:wrap;gap:0.6rem}
  .relay-item{display:flex;align-items:center;gap:0.4rem;font-family:var(--mono);font-size:0.7rem;color:var(--text-muted);background:rgba(255,255,255,0.03);padding:0.3rem 0.7rem;border-radius:100px;border:1px solid rgba(20,168,143,0.1)}
  .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .status-connected{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
  .status-disconnected{background:rgba(255,255,255,0.2)}
  .portfolio-item{display:flex;justify-content:space-between;gap:1rem}
  .portfolio-content{flex:1;min-width:0}
  .portfolio-header{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem}
  .portfolio-title{font-family:var(--mono);font-size:1rem;font-weight:700;margin:0;color:var(--off-white)}
  .badge{padding:0.2rem 0.65rem;border-radius:100px;font-size:0.66rem;font-weight:700;font-family:var(--mono);letter-spacing:0.06em;background:rgba(20,168,143,0.12);color:var(--teal-light);border:1px solid rgba(20,168,143,0.2);text-transform:uppercase}
  .portfolio-description{color:var(--text-muted);margin-bottom:0.75rem;white-space:pre-wrap;font-size:0.88rem;font-weight:300;line-height:1.65}
  .portfolio-meta{display:flex;align-items:center;gap:1rem;font-size:0.78rem;color:rgba(245,242,236,0.35);font-family:var(--mono)}
  .portfolio-link{color:var(--teal-light);text-decoration:none;font-weight:500;transition:color 0.2s}
  .portfolio-link:hover{color:var(--accent)}
  .portfolio-actions{display:flex;gap:0.5rem;flex-shrink:0}
  .form-group{margin-bottom:1rem}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-actions{display:flex;gap:0.75rem;margin-top:0.5rem}
  .form-actions .btn{width:auto}
  .form-label{font-family:var(--mono);font-size:0.66rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;display:block}
  .divider{position:relative;margin:1.5rem 0;display:flex;align-items:center;gap:1rem}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(20,168,143,0.15)}
  .divider-text{font-family:var(--mono);font-size:0.66rem;color:var(--text-muted);white-space:nowrap;letter-spacing:0.06em}
  .portfolio-footer{margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(20,168,143,0.1);text-align:center;font-family:var(--mono);font-size:0.7rem;color:var(--text-muted)}
  .footer-links{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;margin-top:0.6rem}
  .footer-link{color:var(--text-muted);text-decoration:none;transition:color 0.2s}
  .footer-link:hover{color:var(--teal-light)}
  .empty-state{text-align:center;padding:3rem;color:var(--text-muted);font-weight:300}
  .add-btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.7rem 1.4rem;background:var(--teal-light);color:var(--dark);border:none;border-radius:8px;font-family:var(--mono);font-size:0.76rem;font-weight:700;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;margin-bottom:1.2rem;text-transform:uppercase}
  .add-btn:hover{background:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(20,168,143,0.3)}
  .nostr-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 0.8rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:100px;font-family:var(--mono);font-size:0.66rem;color:#c4b5fd;margin-bottom:1.5rem;width:100%;justify-content:center}
  .mb-6{margin-bottom:1.5rem}
  @media(max-width:640px){.form-row{grid-template-columns:1fr}.portfolio-item{flex-direction:column}.main-header{padding:5rem 1.2rem 1.5rem}.container{padding:0 1.2rem 3rem}}
</style>
</head>

<div class="page-glow"></div>
<nav>
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><g transform="translate(10,19)"><circle r="5.5" fill="none" stroke="#14a88f" stroke-width="2"/><circle r="2" fill="#14a88f"/><rect x="-1.2" y="-8.5" width="2.4" height="3" rx="0.6" fill="#14a88f"/><rect x="-1.2" y="5.5" width="2.4" height="3" rx="0.6" fill="#14a88f"/><rect x="5.5" y="-1.2" width="3" height="2.4" rx="0.6" fill="#14a88f"/><rect x="-8.5" y="-1.2" width="3" height="2.4" rx="0.6" fill="#14a88f"/></g><g transform="translate(25,14)"><circle r="4" fill="none" stroke="#f0c93a" stroke-width="1.8"/><circle r="1.5" fill="#f0c93a"/><rect x="-0.9" y="-6.5" width="1.8" height="2.5" rx="0.5" fill="#f0c93a"/><rect x="-0.9" y="4" width="1.8" height="2.5" rx="0.5" fill="#f0c93a"/><rect x="4" y="-0.9" width="2.5" height="1.8" rx="0.5" fill="#f0c93a"/><rect x="-6.5" y="-0.9" width="2.5" height="1.8" rx="0.5" fill="#f0c93a"/></g><text x="3" y="9" font-family="monospace" font-weight="bold" font-size="7" fill="#f0c93a" opacity="0.9">dp</text></svg>
    <div class="nav-wordmark">Digital Playhouse<span>Foundation</span></div>
  </a>
  <a href="index.html" class="nav-back">← Back to DPF</a>

<div id="app"></div>
<script>
const RELAYS = ['wss://relay.damus.io','wss://relay.nostr.band','wss://nos.lol','wss://relay.snort.social'];
const COG_LOGO = `<svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:44px;height:44px"><g transform="translate(10,19)"><circle r="5.5" fill="none" stroke="#14a88f" stroke-width="2"/><circle r="2" fill="#14a88f"/><rect x="-1.2" y="-8.5" width="2.4" height="3" rx="0.6" fill="#14a88f"/><rect x="-1.2" y="5.5" width="2.4" height="3" rx="0.6" fill="#14a88f"/><rect x="5.5" y="-1.2" width="3" height="2.4" rx="0.6" fill="#14a88f"/><rect x="-8.5" y="-1.2" width="3" height="2.4" rx="0.6" fill="#14a88f"/></g><g transform="translate(25,14)"><circle r="4" fill="none" stroke="#f0c93a" stroke-width="1.8"/><circle r="1.5" fill="#f0c93a"/><rect x="-0.9" y="-6.5" width="1.8" height="2.5" rx="0.5" fill="#f0c93a"/><rect x="-0.9" y="4" width="1.8" height="2.5" rx="0.5" fill="#f0c93a"/><rect x="4" y="-0.9" width="2.5" height="1.8" rx="0.5" fill="#f0c93a"/><rect x="-6.5" y="-0.9" width="2.5" height="1.8" rx="0.5" fill="#f0c93a"/></g><text x="3" y="9" font-family="monospace" font-weight="bold" font-size="7" fill="#f0c93a" opacity="0.9">dp</text></svg>`;

class PortfolioApp {
  constructor() {
    this.user = null; this.pubkey = ''; this.privkey = '';
    this.portfolio = []; this.showAddItem = false; this.editingId = null;
    this.relayStatus = {};
    this.formData = { title:'', description:'', category:'project', link:'', date: new Date().toISOString().split('T')[0] };
    this.init();
  }
  init() {
    const stored = localStorage.getItem('nostr_portfolio');
    if (stored) {
      const data = JSON.parse(stored);
      this.portfolio = data.portfolio || [];
      if (data.pubkey) { this.pubkey = data.pubkey; this.user = { pubkey: data.pubkey }; }
    }
    this.render();
  }
  async connectRelays(pk) {
    for (const relay of RELAYS) {
      try {
        const ws = new WebSocket(relay);
        ws.onopen = () => { this.relayStatus[relay] = 'connected'; this.render(); };
        ws.onerror = () => { this.relayStatus[relay] = 'error'; this.render(); };
      } catch(e) { this.relayStatus[relay] = 'error'; }
    }
  }
  async handleLogin() {
    if (window.nostr) {
      try {
        const pk = await window.nostr.getPublicKey();
        this.pubkey = pk; this.user = { pubkey: pk, method: 'extension' };
        await this.connectRelays(pk);
        localStorage.setItem('nostr_portfolio', JSON.stringify({ pubkey: pk, portfolio: this.portfolio }));
        this.render();
      } catch(e) { alert('Failed to connect: ' + e.message); }
    } else if (this.privkey || this.pubkey) {
      const pk = this.pubkey || 'npub' + this.privkey.slice(0, 10);
      this.pubkey = pk; this.user = { pubkey: pk, method: 'manual' };
      await this.connectRelays(pk);
      localStorage.setItem('nostr_portfolio', JSON.stringify({ pubkey: pk, portfolio: this.portfolio }));
      this.render();
    } else { alert('Install Alby or nos2x, or enter your keys'); }
  }
  handleLogout() { this.user = null; this.pubkey = ''; this.privkey = ''; this.relayStatus = {}; this.render(); }
  savePortfolio(p) {
    this.portfolio = p;
    localStorage.setItem('nostr_portfolio', JSON.stringify({ pubkey: this.pubkey, portfolio: p }));
    this.render();
  }
  handleAddItem() {
    if (!this.formData.title) return;
    this.savePortfolio([...this.portfolio, { id: Date.now().toString(), ...this.formData, createdAt: new Date().toISOString() }]);
    this.resetForm();
  }
  handleUpdateItem() {
    if (!this.formData.title) return;
    this.savePortfolio(this.portfolio.map(i => i.id === this.editingId ? { ...i, ...this.formData } : i));
    this.resetForm();
  }
  handleDeleteItem(id) { if (confirm('Delete this item?')) this.savePortfolio(this.portfolio.filter(i => i.id !== id)); }
  startEdit(item) { this.editingId = item.id; this.formData = { title:item.title, description:item.description, category:item.category, link:item.link, date:item.date }; this.showAddItem = true; this.render(); }
  resetForm() { this.editingId = null; this.formData = { title:'', description:'', category:'project', link:'', date: new Date().toISOString().split('T')[0] }; this.showAddItem = false; }
  toggleAddItem() { this.showAddItem = !this.showAddItem; this.editingId = null; this.formData = { title:'', description:'', category:'project', link:'', date: new Date().toISOString().split('T')[0] }; this.render(); }
  cancelForm() { this.showAddItem = false; this.editingId = null; this.render(); }

  renderLoginPage() {
    return `
      <div class="login-wrapper">
        <div class="login-card">
          <div class="login-logo">${COG_LOGO}<div class="login-logo-text">Digital Portfolio<span>Digital Playhouse Foundation</span></div></div>
          <h1>Sign In</h1>
          <p class="subtitle">Connect with your Nostr identity to own and showcase your learning journey</p>
          <div class="nostr-badge">⚡ Nostr-native &nbsp;·&nbsp; You own your data &nbsp;·&nbsp; No central server</div>
          <button onclick="app.handleLogin()" class="btn btn-primary mb-6">⚡ Sign in with Nostr Extension</button>
          <div class="divider"><div class="divider-text">or use keys manually</div></div>
          <div class="form-group">
            <label class="form-label">Public Key</label>
            <input type="text" placeholder="npub1..." oninput="app.pubkey = this.value"/>
          </div>
          <div class="form-group">
            <label class="form-label">Private Key (optional)</label>
            <input type="password" placeholder="nsec1..." oninput="app.privkey = this.value"/>
          </div>
          <button onclick="app.handleLogin()" class="btn btn-secondary mb-6">Sign in with Keys</button>
          <p style="text-align:center;font-family:var(--mono);font-size:0.66rem;color:var(--text-muted)">
            Connects to ${RELAYS.length} Nostr relays &nbsp;·&nbsp;
            Get <a href="https://getalby.com" target="_blank" style="color:var(--teal-light);text-decoration:none">Alby</a> or
            <a href="https://github.com/fiatjaf/nos2x" target="_blank" style="color:var(--teal-light);text-decoration:none">nos2x</a>
          </p>
        </div>
      </div>`;
  }

  renderMainPage() {
    return `
      <div class="main-header">
        <div>
          <div class="header-title">Digital <span>Portfolio</span></div>
          <div class="header-pubkey">${this.pubkey.slice(0,24)}...</div>
        </div>
        <button onclick="app.handleLogout()" class="btn btn-ghost">← Logout</button>
      </div>
      <div class="container">
        <div class="card">
          <div class="card-title">⚡ Nostr Relay Status</div>
          <div class="relay-list">
            ${RELAYS.map(r => `<div class="relay-item"><div class="status-dot ${this.relayStatus[r]==='connected'?'status-connected':'status-disconnected'}"></div><span>${r.replace('wss://','') }</span></div>`).join('')}
          </div>
        </div>
        <button onclick="app.toggleAddItem()" class="add-btn">+ Add Portfolio Item</button>
        ${this.showAddItem ? `
          <div class="card">
            <div class="card-title">${this.editingId ? 'Edit Item' : 'Add New Item'}</div>
            <div class="form-group"><label class="form-label">Title</label><input type="text" placeholder="What did you build or learn?" value="${this.formData.title}" oninput="app.formData.title=this.value"/></div>
            <div class="form-group"><label class="form-label">Description</label><textarea rows="4" placeholder="Describe your work..." oninput="app.formData.description=this.value">${this.formData.description}</textarea></div>
            <div class="form-row form-group">
              <div><label class="form-label">Category</label><select onchange="app.formData.category=this.value">${['project','assignment','research','achievement'].map(c=>`<option value="${c}" ${this.formData.category===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}</select></div>
              <div><label class="form-label">Date</label><input type="date" value="${this.formData.date}" onchange="app.formData.date=this.value"/></div>
            </div>
            <div class="form-group"><label class="form-label">Link (optional)</label><input type="url" placeholder="https://..." value="${this.formData.link}" oninput="app.formData.link=this.value"/></div>
            <div class="form-actions">
              <button onclick="app.${this.editingId?'handleUpdateItem':'handleAddItem'}()" class="btn btn-primary">${this.editingId?'Update':'Add Item'}</button>
              <button onclick="app.cancelForm()" class="btn btn-cancel">Cancel</button>
            </div>
          </div>` : ''}
        ${this.portfolio.length===0 ? `<div class="card empty-state"><p>No portfolio items yet — add your first one to start showcasing your learning journey.</p></div>`
          : this.portfolio.map(item=>`
          <div class="card">
            <div class="portfolio-item">
              <div class="portfolio-content">
                <div class="portfolio-header"><h3 class="portfolio-title">${item.title}</h3><span class="badge">${item.category}</span></div>
                <p class="portfolio-description">${item.description}</p>
                <div class="portfolio-meta">
                  <span>${new Date(item.date).toLocaleDateString()}</span>
                  ${item.link?`<a href="${item.link}" target="_blank" class="portfolio-link">🔗 View</a>`:''}
                </div>
              </div>
              <div class="portfolio-actions">
                <button onclick='app.startEdit(${JSON.stringify(item).replace(/\'/g,"\\'")})' class="btn-edit" title="Edit">✏️</button>
                <button onclick="app.handleDeleteItem('${item.id}')" class="btn-delete" title="Delete">🗑️</button>
              </div>
            </div>
          </div>`).join('')}
        <div class="portfolio-footer">
          <p>Digital Portfolio Platform — Digital Playhouse Foundation</p>
          <div class="footer-links">
            <a href="index.html" class="footer-link">digitalplayhouse.org.au</a>
            <span>·</span><a href="https://github.com/digitalplayhouseorg" target="_blank" class="footer-link">GitHub</a>
            <span>·</span><a href="https://stacker.news/~Education" target="_blank" class="footer-link">~Education</a>
            <span>·</span><a href="https://www.gnu.org/licenses/gpl-3.0.en.html" target="_blank" class="footer-link">GNU GPL v3.0</a>
          </div>
        </div>
      </div>`;
  }

  render() {
    document.getElementById('app').innerHTML = this.user ? this.renderMainPage() : this.renderLoginPage();
  }
}
const app = new PortfolioApp();
</script>
</body>
</html>
